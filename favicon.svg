<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer ring arc segments (broken circle, clockwise from top) -->
  <path stroke="#3BAADE" stroke-width="5" stroke-linecap="round"
        d="M 50 7 A 43 43 0 0 1 84 23"/>
  <path stroke="#3BAADE" stroke-width="5" stroke-linecap="round"
        d="M 89 37 A 43 43 0 0 1 92 57"/>
  <path stroke="#3BAADE" stroke-width="5" stroke-linecap="round"
        d="M 85 74 A 43 43 0 0 1 56 94"/>
  <path stroke="#3BAADE" stroke-width="5" stroke-linecap="round"
        d="M 44 94 A 43 43 0 0 1 14 74"/>
  <path stroke="#3BAADE" stroke-width="5" stroke-linecap="round"
        d="M 8 57 A 43 43 0 0 1 24 18"/>

  <!-- Outer ring: open circles (hollow nodes) -->
  <circle cx="50"  cy="7"  r="4.5" stroke="#3BAADE" stroke-width="3.5" fill="white"/>
  <circle cx="56"  cy="94" r="4.5" stroke="#3BAADE" stroke-width="3.5" fill="white"/>
  <circle cx="8"   cy="57" r="4.5" stroke="#3BAADE" stroke-width="3.5" fill="white"/>
  <circle cx="24"  cy="18" r="4.5" stroke="#3BAADE" stroke-width="3.5" fill="white"/>

  <!-- Outer ring: filled dots -->
  <circle cx="84"  cy="23" r="4.5" fill="#3BAADE"/>
  <circle cx="89"  cy="37" r="4.5" fill="#3BAADE"/>
  <circle cx="92"  cy="57" r="4.5" fill="#3BAADE"/>
  <circle cx="85"  cy="74" r="4.5" fill="#3BAADE"/>
  <circle cx="44"  cy="94" r="4.5" fill="#3BAADE"/>
  <circle cx="14"  cy="74" r="4.5" fill="#3BAADE"/>

  <!-- Right stalk (circuit trace extending outward to open circle) -->
  <path stroke="#3BAADE" stroke-width="4.5" stroke-linecap="round" d="M 92 47 L 100 47"/>
  <circle cx="100" cy="47" r="4" stroke="#3BAADE" stroke-width="3.5" fill="white"/>

  <!-- Interior circuit paths -->
  <path stroke="#3BAADE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        d="M 50 7 L 50 28 Q 48 36 38 41 L 26 46"/>
  <path stroke="#3BAADE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
        d="M 84 23 L 68 33 Q 62 42 61 52 L 60 63"/>
  <path stroke="#3BAADE" stroke-width="3.5" stroke-linecap="round"
        d="M 26 46 Q 19 54 24 62 L 34 70"/>
  <path stroke="#3BAADE" stroke-width="3.5" stroke-linecap="round"
        d="M 60 63 Q 57 73 53 80"/>

  <!-- Interior nodes: filled dots -->
  <circle cx="50"  cy="28" r="4"   fill="#3BAADE"/>
  <circle cx="38"  cy="41" r="4"   fill="#3BAADE"/>
  <circle cx="60"  cy="63" r="4"   fill="#3BAADE"/>
  <circle cx="53"  cy="80" r="4"   fill="#3BAADE"/>

  <!-- Interior nodes: open circles -->
  <circle cx="26"  cy="46" r="3.8" stroke="#3BAADE" stroke-width="3"   fill="white"/>
  <circle cx="62"  cy="43" r="3.5" stroke="#3BAADE" stroke-width="2.8" fill="white"/>
  <circle cx="34"  cy="70" r="3.5" stroke="#3BAADE" stroke-width="2.8" fill="white"/>

  <!-- Small interior accent dots -->
  <circle cx="56"  cy="37" r="3.5" fill="#3BAADE"/>
  <circle cx="76"  cy="36" r="3.5" fill="#3BAADE"/>
  <circle cx="50"  cy="56" r="3"   fill="#3BAADE"/>
</svg>
